<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .bg { fill: #0f0f0f; }
      .initials {
        fill: #6366f1;
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 14px;
        animation: pulse 2.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { fill: #6366f1; }
        50%       { fill: #818cf8; }
      }
    </style>
  </defs>
  <rect width="32" height="32" rx="7" class="bg" />
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" class="initials">JS</text>
</svg>
